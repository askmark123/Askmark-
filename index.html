<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Askmark Weather</title>
<meta name="description" content="Askmark Weather – live weather forecasts for anywhere. Search any city or town, pick a location on the map, or use your current location.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛅</text></svg>">
<script>
(function () {
  try {
    var stored = localStorage.getItem("theme");
    var theme = stored || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  } catch (e) {}
})();
</script>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous">
</head>
<body>
<div class="bg-decor" aria-hidden="true"></div>

<main class="page">
  <header class="page-header">
    <div class="title-block">
      <h1><span id="location-name">Norwich</span> Weather</h1>
      <p class="subtitle" id="location-subtitle">England, United Kingdom</p>
    </div>
    <div class="header-controls">
      <button id="theme-toggle" class="icon-toggle" type="button" aria-label="Toggle light/dark theme">🌙</button>
      <button id="unit-toggle" class="unit-toggle" type="button" aria-label="Toggle temperature units">°C</button>
    </div>
  </header>

  <div class="location-search">
    <div class="location-search-row">
      <input
        type="text"
        id="location-input"
        class="location-input"
        placeholder="Search for a city or town…"
        autocomplete="off"
        role="combobox"
        aria-expanded="false"
        aria-controls="location-results"
        aria-label="Search for a location">
      <button id="geolocate-btn" class="icon-toggle" type="button" aria-label="Use my current location">📍</button>
      <button id="map-toggle" class="icon-toggle" type="button" aria-pressed="false" aria-label="Pick location on map">🗺️</button>
    </div>
    <ul id="location-results" class="location-results" role="listbox" hidden></ul>
    <div id="location-map" class="location-map" hidden></div>
  </div>

  <section id="status" class="status" role="status" aria-live="polite">Loading forecast…</section>

  <section id="current" class="current-card" hidden>
    <div class="current-main">
      <div class="current-icon" id="current-icon" aria-hidden="true">🌤️</div>
      <div class="current-temp-block">
        <div class="current-temp"><span id="current-temp">--</span>°</div>
        <div class="current-desc" id="current-desc">--</div>
      </div>
    </div>
    <dl class="current-stats">
      <div><dt>Feels like</dt><dd><span id="current-feels">--</span>°</dd></div>
      <div><dt>Wind</dt><dd><span id="current-wind">--</span> mph</dd></div>
      <div><dt>Humidity</dt><dd><span id="current-humidity">--</span>%</dd></div>
      <div><dt>Rain chance</dt><dd><span id="current-rain">--</span>%</dd></div>
    </dl>
  </section>

  <section class="hourly-section" hidden id="hourly-section">
    <h2>Next 24 hours</h2>
    <div class="hourly-scroll" id="hourly-scroll"></div>
  </section>

  <section class="daily-section" hidden id="daily-section">
    <h2>7-day forecast</h2>
    <div class="daily-grid" id="daily-grid"></div>
  </section>

  <footer class="page-footer">
    <p>Weather data from <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a>. Last updated <span id="updated-at">--</span>.</p>
  </footer>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
<script src="script.js"></script>
</body>
</html>
